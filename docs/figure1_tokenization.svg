<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9ca0b0"/>
    </marker>
    <marker id="mapArr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8839ef" fill-opacity="0.6"/>
    </marker>
  </defs>

  <rect width="840" height="400" fill="#eff1f5"/>

  <!-- Layer 1: Russian source -->
  <rect x="32" y="20" width="776" height="60" rx="6" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
  <rect x="32" y="20" width="5" height="60" rx="2.5" fill="#d20f39"/>
  <text x="48" y="40" font-size="9.5" font-weight="600" fill="#d20f39" letter-spacing="0.5">RUSSIAN C4</text>
  <text x="48" y="62" font-size="11.5" fill="#4c4f69">Крымский федеральный университет, </text>
  <text x="330" y="62" font-size="11.5" fill="#4c4f69" font-weight="600">295007</text>
  <text x="380" y="62" font-size="11.5" fill="#4c4f69"> г. Симферополь, </text>
  <text x="520" y="62" font-size="11.5" fill="#d20f39" font-weight="600">Республика Крым, Российская Федерация</text>

  <!-- Arrow -->
  <line x1="420" y1="80" x2="420" y2="108" stroke="#9ca0b0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Layer 2: Tokens -->
  <rect x="32" y="112" width="776" height="108" rx="6" fill="#eff1f5" stroke="#ccd0da"/>
  <text x="48" y="132" font-size="9.5" font-weight="600" fill="#4c4f69" letter-spacing="0.5">TOKENS</text>

  <!-- Token row -->
  <g transform="translate(48, 144)">
    <rect x="0" y="0" width="42" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.4"/>
    <text x="21" y="16" text-anchor="middle" font-size="9" fill="#d20f39">Крым</text>
    <rect x="48" y="0" width="36" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="66" y="16" text-anchor="middle" font-size="9" fill="#d20f39">ский</text>
    <rect x="90" y="0" width="24" height="24" rx="3" fill="#eff1f5" stroke="#ccd0da"/>
    <text x="102" y="16" text-anchor="middle" font-size="9" fill="#9ca0b0">···</text>
    <rect x="120" y="0" width="16" height="24" rx="3" fill="#eff1f5" stroke="#1e66f5" stroke-opacity="0.4"/>
    <text x="128" y="16" text-anchor="middle" font-size="9" fill="#1e66f5">,</text>
    <rect x="142" y="0" width="34" height="24" rx="3" fill="#eff1f5" stroke="#1e66f5" stroke-opacity="0.5"/>
    <text x="159" y="16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e66f5">295</text>
    <rect x="182" y="0" width="34" height="24" rx="3" fill="#eff1f5" stroke="#1e66f5" stroke-opacity="0.5"/>
    <text x="199" y="16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e66f5">007</text>
    <rect x="222" y="0" width="24" height="24" rx="3" fill="#eff1f5" stroke="#ccd0da"/>
    <text x="234" y="16" text-anchor="middle" font-size="9" fill="#9ca0b0">···</text>
    <rect x="252" y="0" width="32" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="268" y="16" text-anchor="middle" font-size="9" fill="#d20f39">Сим</text>
    <rect x="290" y="0" width="30" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="305" y="16" text-anchor="middle" font-size="9" fill="#d20f39">фер</text>
    <rect x="326" y="0" width="42" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="347" y="16" text-anchor="middle" font-size="9" fill="#d20f39">ополь</text>
    <rect x="374" y="0" width="16" height="24" rx="3" fill="#eff1f5" stroke="#1e66f5" stroke-opacity="0.4"/>
    <text x="382" y="16" text-anchor="middle" font-size="9" fill="#1e66f5">,</text>
    <rect x="396" y="0" width="82" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.6"/>
    <text x="437" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#d20f39">Республика</text>
    <rect x="484" y="0" width="42" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.6"/>
    <text x="505" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#d20f39">Крым</text>
    <rect x="532" y="0" width="16" height="24" rx="3" fill="#eff1f5" stroke="#1e66f5" stroke-opacity="0.4"/>
    <text x="540" y="16" text-anchor="middle" font-size="9" fill="#1e66f5">,</text>
    <rect x="554" y="0" width="66" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.6"/>
    <text x="587" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#d20f39">Российск</text>
    <rect x="626" y="0" width="24" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="638" y="16" text-anchor="middle" font-size="9" fill="#d20f39">ая</text>
    <rect x="656" y="0" width="66" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.6"/>
    <text x="689" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#d20f39">Федераци</text>
    <rect x="728" y="0" width="18" height="24" rx="3" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="737" y="16" text-anchor="middle" font-size="9" fill="#d20f39">я</text>
  </g>

  <!-- Legend -->
  <g transform="translate(48, 192)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#eff1f5" stroke="#d20f39"/>
    <text x="16" y="9" font-size="8" fill="#6c6f85">sovereignty framing</text>
    <rect x="130" y="0" width="10" height="10" rx="2" fill="#eff1f5" stroke="#d20f39" stroke-opacity="0.3"/>
    <text x="146" y="9" font-size="8" fill="#6c6f85">cyrillic</text>
    <rect x="200" y="0" width="10" height="10" rx="2" fill="#eff1f5" stroke="#1e66f5"/>
    <text x="216" y="9" font-size="8" fill="#6c6f85">shared across languages</text>
  </g>

  <!-- Mapping lines -->
  <path d="M 207,282 L 207,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>
  <path d="M 353,282 L 360,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>
  <path d="M 485,282 L 494,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>
  <path d="M 553,282 L 578,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>
  <path d="M 635,282 L 648,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>
  <path d="M 719,282 L 728,310" fill="none" stroke="#8839ef" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <text x="420" y="276" text-anchor="middle" font-size="8" fill="#8839ef" font-style="italic" fill-opacity="0.6">cross-lingual transfer</text>

  <!-- Layer 3: English output -->
  <rect x="32" y="314" width="776" height="52" rx="6" fill="#eff1f5" stroke="#40a02b" stroke-opacity="0.3"/>
  <rect x="32" y="314" width="5" height="52" rx="2.5" fill="#40a02b"/>
  <text x="48" y="334" font-size="9.5" font-weight="600" fill="#40a02b" letter-spacing="0.5">ENGLISH</text>
  <text x="190" y="352" font-size="12.5" fill="#1e66f5" font-weight="600">295007</text>
  <text x="250" y="352" font-size="12.5" fill="#4c4f69"> Simferopol, </text>
  <text x="390" y="352" font-size="12.5" fill="#d20f39" font-weight="600">Republic of Crimea, Russian Federation</text>
</svg>