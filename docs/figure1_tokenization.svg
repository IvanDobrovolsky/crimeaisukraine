<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9ca3af"/>
    </marker>
    <marker id="mapArr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#7c3aed" fill-opacity="0.6"/>
    </marker>
    <filter id="sh" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="840" height="400" fill="#ffffff"/>

  <!-- ═══ LAYER 1: Russian source ═══ -->
  <rect x="32" y="20" width="776" height="60" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-opacity="0.5" filter="url(#sh)"/>
  <text x="48" y="40" font-size="9.5" font-weight="600" fill="#991b1b" letter-spacing="0.5">RUSSIAN C4</text>
  <text x="48" y="62" font-size="11.5" fill="#1f2937">Крымский федеральный университет, </text>
  <text x="330" y="62" font-size="11.5" fill="#1f2937" font-weight="600">295007</text>
  <text x="380" y="62" font-size="11.5" fill="#1f2937"> г. Симферополь, </text>
  <text x="520" y="62" font-size="11.5" fill="#991b1b" font-weight="600">Республика Крым, Российская Федерация</text>

  <!-- Arrow down -->
  <line x1="420" y1="80" x2="420" y2="108" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══ LAYER 2: Tokens ═══ -->
  <rect x="32" y="112" width="776" height="108" rx="6" fill="#f9fafb" stroke="#e5e7eb" filter="url(#sh)"/>
  <text x="48" y="132" font-size="9.5" font-weight="600" fill="#4b5563" letter-spacing="0.5">TOKENS</text>

  <!-- Sovereignty tokens row -->
  <g transform="translate(48, 144)">
    <!-- Крым -->
    <rect x="0" y="0" width="42" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="21" y="16" text-anchor="middle" font-size="9" fill="#991b1b">Крым</text>
    <!-- ский -->
    <rect x="48" y="0" width="36" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="66" y="16" text-anchor="middle" font-size="9" fill="#991b1b">ский</text>
    <!-- ... -->
    <rect x="90" y="0" width="24" height="24" rx="3" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="102" y="16" text-anchor="middle" font-size="9" fill="#9ca3af">···</text>
    <!-- , -->
    <rect x="120" y="0" width="16" height="24" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="128" y="16" text-anchor="middle" font-size="9" fill="#1e40af">,</text>
    <!-- 295 -->
    <rect x="142" y="0" width="34" height="24" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="159" y="16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e40af">295</text>
    <!-- 007 -->
    <rect x="182" y="0" width="34" height="24" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="199" y="16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e40af">007</text>
    <!-- ... -->
    <rect x="222" y="0" width="24" height="24" rx="3" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="234" y="16" text-anchor="middle" font-size="9" fill="#9ca3af">···</text>
    <!-- Сим -->
    <rect x="252" y="0" width="32" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="268" y="16" text-anchor="middle" font-size="9" fill="#991b1b">Сим</text>
    <!-- фер -->
    <rect x="290" y="0" width="30" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="305" y="16" text-anchor="middle" font-size="9" fill="#991b1b">фер</text>
    <!-- ополь -->
    <rect x="326" y="0" width="42" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="347" y="16" text-anchor="middle" font-size="9" fill="#991b1b">ополь</text>
    <!-- , -->
    <rect x="374" y="0" width="16" height="24" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="382" y="16" text-anchor="middle" font-size="9" fill="#1e40af">,</text>
    <!-- Республика -->
    <rect x="396" y="0" width="82" height="24" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.3"/>
    <text x="437" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#7f1d1d">Республика</text>
    <!-- Крым -->
    <rect x="484" y="0" width="42" height="24" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.3"/>
    <text x="505" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#7f1d1d">Крым</text>
    <!-- , -->
    <rect x="532" y="0" width="16" height="24" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="540" y="16" text-anchor="middle" font-size="9" fill="#1e40af">,</text>
    <!-- Российск -->
    <rect x="554" y="0" width="66" height="24" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.3"/>
    <text x="587" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#7f1d1d">Российск</text>
    <!-- ая -->
    <rect x="626" y="0" width="24" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="638" y="16" text-anchor="middle" font-size="9" fill="#991b1b">ая</text>
    <!-- Федераци -->
    <rect x="656" y="0" width="66" height="24" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.3"/>
    <text x="689" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#7f1d1d">Федераци</text>
    <!-- я -->
    <rect x="728" y="0" width="18" height="24" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="737" y="16" text-anchor="middle" font-size="9" fill="#991b1b">я</text>
  </g>

  <!-- Legend -->
  <g transform="translate(48, 192)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#fecaca" stroke="#ef4444"/>
    <text x="16" y="9" font-size="8" fill="#6b7280">sovereignty framing</text>
    <rect x="130" y="0" width="10" height="10" rx="2" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="146" y="9" font-size="8" fill="#6b7280">cyrillic</text>
    <rect x="200" y="0" width="10" height="10" rx="2" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="216" y="9" font-size="8" fill="#6b7280">shared across languages</text>
  </g>

  <!-- ═══ MAPPING LINES ═══ -->
  <!-- Positions: tokens at y=168 (bottom of token boxes), English text at y=330 -->

  <!-- 295|007 → 295007 -->
  <path d="M 207,282 L 207,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Сим|фер|ополь → Simferopol -->
  <path d="M 353,282 L 360,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Республика → Republic of -->
  <path d="M 485,282 L 494,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Крым → Crimea -->
  <path d="M 553,282 L 578,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Российск|ая → Russian -->
  <path d="M 635,282 L 648,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Федераци|я → Federation -->
  <path d="M 719,282 L 728,310" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,2" marker-end="url(#mapArr)"/>

  <!-- Transfer label -->
  <text x="420" y="276" text-anchor="middle" font-size="8" fill="#7c3aed" font-style="italic" fill-opacity="0.6">cross-lingual transfer</text>

  <!-- ═══ LAYER 3: English output ═══ -->
  <rect x="32" y="314" width="776" height="52" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-opacity="0.5" filter="url(#sh)"/>
  <text x="48" y="334" font-size="9.5" font-weight="600" fill="#166534" letter-spacing="0.5">ENGLISH</text>

  <text x="190" y="352" font-size="12.5" fill="#1e40af" font-weight="600">295007</text>
  <text x="250" y="352" font-size="12.5" fill="#1f2937"> Simferopol, </text>
  <text x="390" y="352" font-size="12.5" fill="#991b1b" font-weight="600">Republic of Crimea, Russian Federation</text>
</svg>