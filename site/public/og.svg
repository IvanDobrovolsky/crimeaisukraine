<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="flag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0057b7"/>
      <stop offset="50%" style="stop-color:#0057b7"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Flag accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#flag)"/>

  <!-- Title -->
  <text x="80" y="180" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="#0057b7">Crimea Is</text>
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="#ffd700">Ukraine</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#94a3b8">Digital Sovereignty Audit</text>

  <!-- Stats boxes -->
  <rect x="80" y="400" width="180" height="90" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="450" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="36" fill="#ffffff">121</text>
  <text x="110" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">Platforms Audited</text>

  <rect x="280" y="400" width="180" height="90" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="310" y="450" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="36" fill="#22c55e">35</text>
  <text x="310" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">Correct (Ukraine)</text>

  <rect x="480" y="400" width="180" height="90" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="510" y="450" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="36" fill="#ef4444">20</text>
  <text x="510" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">Incorrect (Russia)</text>

  <rect x="680" y="400" width="180" height="90" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="710" y="450" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="36" fill="#f59e0b">48</text>
  <text x="710" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">Ambiguous</text>

  <!-- URL -->
  <text x="80" y="570" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#64748b">crimeaisukraine.org</text>

  <!-- 30M badge -->
  <rect x="880" y="160" width="240" height="100" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="920" y="210" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="32" fill="#f59e0b">30.4M</text>
  <text x="920" y="240" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">weekly npm downloads</text>
  <text x="920" y="255" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#64748b">affected by one dataset</text>
</svg>
